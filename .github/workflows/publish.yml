name: Publish RC

on:
  pull_request:
    types:
      - labeled
      - synchronize

jobs:
  check-version:
    name: Check version
    if: contains(github.event.pull_request.labels.*.name, 'publish')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      rc_version: ${{ steps.version.outputs.rc_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -oP 'project\(\s*numops\s+VERSION\s+\K[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt)
          SHORT_SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)
          RC_VERSION="${VERSION}-dev-${SHORT_SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "rc_version=${RC_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION}"
          echo "RC version: ${RC_VERSION}"

      - name: Set up Conan
        uses: skolobov/shared-workflows/actions/conan-setup@v1
        with:
          cache-conan: "false"

      - name: Configure conan-stable remote
        uses: skolobov/shared-workflows/actions/conan-remote@v1
        with:
          remote-name: conan-stable
          remote-url: ${{ secrets.JFROG_URL }}
          remote-user: ${{ secrets.JFROG_USER }}
          remote-token: ${{ secrets.JFROG_TOKEN }}

      - name: Check version does not exist in conan-stable
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          EXISTS=$(conan list "numops/${VERSION}" -r conan-stable --format=json \
            | jq --arg ref "numops/${VERSION}" '.["conan-stable"] | has($ref)')
          if [ "${EXISTS}" = "true" ]; then
            echo "::error::Version ${VERSION} already exists in conan-stable. Bump the version."
            exit 1
          fi
          echo "Version ${VERSION} is available."

  publish-rc:
    name: Publish RC (${{ matrix.os }})
    needs: check-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Conan
        uses: skolobov/shared-workflows/actions/conan-setup@v1
        with:
          cache-conan: "false"

      - name: Configure conan-rc remote
        uses: skolobov/shared-workflows/actions/conan-remote@v1
        with:
          remote-name: conan-rc
          remote-url: ${{ secrets.JFROG_URL }}
          remote-user: ${{ secrets.JFROG_USER }}
          remote-token: ${{ secrets.JFROG_TOKEN }}

      - name: Build and upload RC package
        run: |
          conan create . --version="${{ needs.check-version.outputs.rc_version }}"
          conan upload "numops/${{ needs.check-version.outputs.rc_version }}" -r conan-rc --confirm
