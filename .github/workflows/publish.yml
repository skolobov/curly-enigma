name: Publish RC

on:
  pull_request:
    types:
      - labeled
      - synchronize

jobs:
  check-version:
    name: Check version
    if: contains(github.event.pull_request.labels.*.name, 'publish')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      rc_version: ${{ steps.version.outputs.rc_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -oE 'project\(\s*numops\s+VERSION\s+[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          SHORT_SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)
          RC_VERSION="${VERSION}-dev-${SHORT_SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "rc_version=${RC_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION}"
          echo "RC version: ${RC_VERSION}"

      - name: Validate version bump vs base branch
        run: |
          git fetch --no-tags origin "${{ github.base_ref }}" --depth=1
          BASE_VERSION=$(git show "origin/${{ github.base_ref }}:CMakeLists.txt" \
            | grep -oE 'project\(\s*numops\s+VERSION\s+[0-9]+\.[0-9]+\.[0-9]+' \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          HEAD_VERSION="${{ steps.version.outputs.version }}"

          echo "Base version: ${BASE_VERSION}"
          echo "Head version: ${HEAD_VERSION}"

          if [ "${HEAD_VERSION}" = "${BASE_VERSION}" ]; then
            echo "::error::Version was not bumped in this PR."
            exit 1
          fi

          LOWEST=$(printf '%s\n%s\n' "${BASE_VERSION}" "${HEAD_VERSION}" | sort -V | head -n1)
          if [ "${LOWEST}" = "${HEAD_VERSION}" ]; then
            echo "::error::Version must be greater than base branch version."
            exit 1
          fi

      - name: Set up Conan
        uses: skolobov/shared-workflows/actions/conan-setup@v1
        with:
          profile: conan/profiles/linux-x86_64
          cache-conan: "false"

      - name: Configure conan-stable remote
        uses: skolobov/shared-workflows/actions/conan-remote@v1
        with:
          remote-name: conan-stable
          remote-url: ${{ secrets.JFROG_URL }}
          remote-user: ${{ secrets.JFROG_USER }}
          remote-token: ${{ secrets.JFROG_TOKEN }}

      - name: Check version does not exist in conan-stable
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          EXISTS=$(conan list "numops/${VERSION}" -r conan-stable --format=json \
            | jq --arg ref "numops/${VERSION}" '.["conan-stable"] | has($ref)')
          if [ "${EXISTS}" = "true" ]; then
            echo "::error::Version ${VERSION} already exists in conan-stable. Bump the version."
            exit 1
          fi
          echo "Version ${VERSION} is available."

  publish-rc:
    name: Publish RC
    needs: check-version
    uses: skolobov/shared-workflows/.github/workflows/conan-build-upload.yml@v1
    with:
      version: ${{ needs.check-version.outputs.rc_version }}
      remote-name: conan-rc
    secrets:
      remote-url: ${{ secrets.JFROG_URL }}
      remote-user: ${{ secrets.JFROG_USER }}
      remote-token: ${{ secrets.JFROG_TOKEN }}
