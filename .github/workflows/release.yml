name: Release

on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Release
    if: >-
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'publish')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -oE 'project\(\s*numops\s+VERSION\s+[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing version: ${VERSION}"

      - name: Create git tag
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes

  publish:
    name: Publish (${{ matrix.os }})
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            profile: conan/profiles/linux-x86_64
          - os: macos-latest
            profile: conan/profiles/macos-armv8
          - os: windows-latest
            profile: conan/profiles/windows-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Conan
        uses: skolobov/shared-workflows/actions/conan-setup@v1
        with:
          profile: ${{ matrix.profile }}
          cache-conan: "false"

      - name: Configure conan-stable remote
        uses: skolobov/shared-workflows/actions/conan-remote@v1
        with:
          remote-name: conan-stable
          remote-url: ${{ secrets.JFROG_URL }}
          remote-user: ${{ secrets.JFROG_USER }}
          remote-token: ${{ secrets.JFROG_TOKEN }}

      - name: Build and publish release package
        shell: bash
        run: |
          conan lock create . --version="${{ needs.release.outputs.version }}" \
            --profile:host="${{ matrix.profile }}" \
            --profile:build="${{ matrix.profile }}" \
            --lockfile-out=conan.lock
          conan create . --version="${{ needs.release.outputs.version }}" \
            --lockfile=conan.lock
          conan upload "numops/${{ needs.release.outputs.version }}" -r conan-stable --confirm

      - name: Package artifacts
        shell: bash
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          PKG_ID=$(conan list "numops/${VERSION}:*" --format=json \
            | jq -r 'to_entries[0].value | to_entries[0].value.revisions
                      | to_entries[0].value.packages | keys[0]')
          PKG_PATH=$(conan cache path "numops/${VERSION}:${PKG_ID}")
          mkdir -p dist
          tar czf "dist/numops-${VERSION}-${{ matrix.os }}.tar.gz" -C "${PKG_PATH}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: numops-${{ matrix.os }}
          path: dist/*

  attach-artifacts:
    name: Attach release artifacts
    needs:
      - release
      - publish
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ needs.release.outputs.version }}" \
            artifacts/* --clobber \
            --repo "${{ github.repository }}"
