name: Release

on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Release
    if: >-
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'publish')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -oP 'project\(\s*numops\s+VERSION\s+\K[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing version: ${VERSION}"

      - name: Create git tag
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes

  publish:
    name: Publish (${{ matrix.os }})
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .tool-versions
          cache: pip

      - name: Install Conan
        run: pip install -r requirements.txt

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Configure conan-stable remote
        run: |
          conan remote add conan-stable "${{ secrets.JFROG_URL }}/conan-stable"
          conan remote login conan-stable "${{ secrets.JFROG_USER }}" -p "${{ secrets.JFROG_TOKEN }}"

      - name: Build and publish release package
        run: |
          conan create . --version="${{ needs.release.outputs.version }}"
          conan upload "numops/${{ needs.release.outputs.version }}" -r conan-stable --confirm

      - name: Package artifacts
        shell: bash
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          PKG_PATH=$(conan cache path "numops/${VERSION}:*" 2>/dev/null || true)
          mkdir -p dist
          if [ -n "${PKG_PATH}" ] && [ -d "${PKG_PATH}" ]; then
            tar czf "dist/numops-${VERSION}-${{ matrix.os }}.tar.gz" -C "${PKG_PATH}" .
          else
            echo "Package path not found, creating metadata-only artifact"
            echo "numops/${VERSION} published to conan-stable" > "dist/numops-${VERSION}-${{ matrix.os }}.txt"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: numops-${{ matrix.os }}
          path: dist/*

  attach-artifacts:
    name: Attach release artifacts
    needs:
      - release
      - publish
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ needs.release.outputs.version }}" \
            artifacts/* --clobber \
            --repo "${{ github.repository }}"
