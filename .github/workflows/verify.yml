name: Verify

on:
  pull_request:
    types:
      - labeled
      - synchronize

jobs:
  integration-test:
    name: Integration (${{ matrix.os }})
    if: contains(github.event.pull_request.labels.*.name, 'verify')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .tool-versions
          cache: pip

      - name: Install Conan
        run: pip install -r requirements.txt

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py', 'requirements.txt') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: Compute RC version
        id: version
        shell: bash
        run: |
          VERSION=$(grep -oE 'project\(\s*numops\s+VERSION\s+[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          SHORT_SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)
          echo "rc_version=${VERSION}-dev-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Run integration test
        run: conan create . --version="${{ steps.version.outputs.rc_version }}"
