name: Verify

on:
  pull_request:
    types:
      - labeled
      - synchronize

jobs:
  compute-version:
    name: Compute RC version
    if: contains(github.event.pull_request.labels.*.name, 'verify')
    runs-on: ubuntu-latest
    outputs:
      rc_version: ${{ steps.version.outputs.rc_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute RC version
        id: version
        run: |
          VERSION=$(grep -oE 'project\(\s*numops\s+VERSION\s+[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          SHORT_SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)
          RC_VERSION="${VERSION}-dev-${SHORT_SHA}"
          echo "rc_version=${RC_VERSION}" >> "$GITHUB_OUTPUT"
          echo "RC version: ${RC_VERSION}"

  upload-rc:
    name: Upload RC (${{ matrix.os }})
    needs: compute-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            profile: conan/profiles/linux-x86_64
          - os: macos-latest
            profile: conan/profiles/macos-armv8
          - os: windows-latest
            profile: conan/profiles/windows-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Conan
        uses: skolobov/shared-workflows/actions/conan-setup@v1
        with:
          profile: ${{ matrix.profile }}
          cache-conan: "false"

      - name: Configure conan-rc remote
        uses: skolobov/shared-workflows/actions/conan-remote@v1
        with:
          remote-name: conan-rc
          remote-url: ${{ secrets.JFROG_URL }}
          remote-user: ${{ secrets.JFROG_USER }}
          remote-token: ${{ secrets.JFROG_TOKEN }}

      - name: Build and upload RC package
        shell: bash
        run: |
          RC="${{ needs.compute-version.outputs.rc_version }}"
          conan create . --version="${RC}"
          conan upload "numops/${RC}" -r conan-rc --confirm

  consumer-test:
    name: Consumer (${{ matrix.os }})
    needs:
      - compute-version
      - upload-rc
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            profile: conan/profiles/linux-x86_64
          - os: macos-latest
            profile: conan/profiles/macos-armv8
          - os: windows-latest
            profile: conan/profiles/windows-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Conan
        uses: skolobov/shared-workflows/actions/conan-setup@v1
        with:
          profile: ${{ matrix.profile }}
          cache-conan: "false"

      - name: Configure conan-rc remote
        uses: skolobov/shared-workflows/actions/conan-remote@v1
        with:
          remote-name: conan-rc
          remote-url: ${{ secrets.JFROG_URL }}
          remote-user: ${{ secrets.JFROG_USER }}
          remote-token: ${{ secrets.JFROG_TOKEN }}

      - name: Install numops from conan-rc
        working-directory: tests/integration
        shell: bash
        run: |
          RC="${{ needs.compute-version.outputs.rc_version }}"
          conan install --requires="numops/${RC}" \
            --generator=CMakeToolchain --generator=CMakeDeps \
            --output-folder=build/generators \
            --build=missing -r conan-rc

      - name: Build consumer project
        working-directory: tests/integration
        shell: bash
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=build/generators/conan_toolchain.cmake
          cmake --build build --config Release

      - name: Run consumer test
        working-directory: tests/integration
        shell: bash
        run: |
          find build -name "consumer" -o -name "consumer.exe" \
            | head -1 | xargs -I{} "{}"
